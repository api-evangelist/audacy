apis:
  - name: Audacy Streaming App
    description: >-
      Audacy.com and the Audacy mobile apps deliver live radio, podcasts, sports
      play-by-play, and exclusive stations across iOS, Android, and connected
      devices. The product is a consumer streaming surface, not a developer
      product; there is no public API or OpenAPI definition. Access for third
      parties is through partner integrations (Sonos Radio U.S. distribution,
      Amazon DSP for advertising) rather than direct API calls.
    humanURL: https://www.audacy.com
    baseURL: https://www.audacy.com
    tags:
      - Streaming
      - Live Radio
      - Podcasts
      - Sports
      - News
      - Music
      - Consumer App
    properties:
