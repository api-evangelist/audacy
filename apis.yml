name: Audacy
description: >-
  Audacy, Inc. is a U.S. multi-platform audio and entertainment company that
  operates the country's second-largest radio group alongside the Audacy
  streaming app, a major podcast network, and the Amperwave audio ad-tech and
  distribution platform. Formerly known as Entercom (rebranded to Audacy on
  March 30, 2021), the company filed prepackaged Chapter 11 bankruptcy on
  January 7, 2024 and emerged on September 30, 2024 as a privately held company
  after equitizing approximately $1.6 billion of funded debt and reducing total
  debt from roughly $1.9 billion to $350 million. The current portfolio spans
  ~230 radio brands across 47 markets, 200+ million monthly listeners, ~2
  billion annual podcast downloads, and the Cadence13, Pineapple Street Studios,
  Podcorn, and BetMGM Network (formerly BetQL) audio brands. There is no public
  developer API, no published OpenAPI, and no GitHub organization with public
  repositories; integration is brokered through ad sales, programmatic
  marketplaces, and the Amperwave platform.
